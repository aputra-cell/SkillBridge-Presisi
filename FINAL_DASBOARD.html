<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SkillBridge</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #eaf1ff;
      overflow-x: hidden;
    }

    /* SIDEBAR SAMA KAYAK DASHBOARD */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 260px;
      background: linear-gradient(180deg, #1e3a8a 0%, #2563eb 100%);
      padding: 25px 20px;
      transition: 0.3s;
      z-index: 1000;
      box-shadow: 4px 0 20px rgba(37, 99, 235, 0.2);
    }
    .sidebar-brand {
      font-weight: 700;
      font-size: 1.6rem;
      color: #fff;
      text-align: center;
      margin-bottom: 40px;
    }
    .sidebar-menu {
      list-style: none;
      padding: 0;
    }
    .sidebar-menu li a {
      display: flex;
      align-items: center;
      color: rgba(255,255,255,0.85);
      padding: 12px 18px;
      margin-bottom: 8px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }
    .sidebar-menu li a i {
      width: 25px;
      font-size: 1.1rem;
    }
    .sidebar-menu li a:hover, .sidebar-menu li a.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    .sidebar-menu li a.logout {
      color: #fecaca;
      position: absolute;
      bottom: 25px;
      width: calc(100% - 40px);
    }
    .sidebar-menu li a.logout:hover {
      background: rgba(239,68,68,0.2);
      color: #fff;
    }

    /* MAIN CONTENT */
    .main-content {
      margin-left: 260px;
      padding: 30px;
      transition: 0.3s;
    }
    .welcome h2 {
      font-weight: 700;
      color: #1a1f36;
    }
    .welcome p {
      color: #64748b;
    }

    /* STAT CARD */
    .stat-card {
      background: #fff;
      border-radius: 20px;
      padding: 25px 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      transition: 0.3s;
      height: 100%;
    }
    .stat-card:hover {
      transform: translateY(-8px);
    }
    .stat-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      color: #fff;
      font-size: 1.4rem;
    }
    .stat-card h3 {
      font-weight: 700;
      font-size: 2rem;
      color: #1a1f36;
      margin-bottom: 5px;
    }
    .stat-card p {
      color: #6c757d;
      margin: 0;
      font-weight: 500;
    }

    /* CHART CARD KECIL */
    .chart-card {
      background: #fff;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      margin-top: 30px;
    }
    .chart-card h5 {
      font-weight: 700;
      color: #1a1f36;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
    }
    .chart-container {
      position: relative;
      height: 240px; /* grafik dibuat kecil */
    }

    /* TOGGLE BUTTON MOBILE */
    .toggle-btn {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1100;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
    }

    /* RESPONSIVE */
    @media (max-width: 992px) {
      .sidebar {
        left: -260px;
      }
      .sidebar.active {
        left: 0;
      }
      .main-content {
        margin-left: 0;
      }
      .toggle-btn {
        display: block;
      }
    }
    @media (max-width: 768px) {
      .main-content {
        padding: 20px 15px;
      }
      .chart-container {
        height: 200px;
      }
    }
  </style>
</head>
<body>

  <!-- TOGGLE BUTTON MOBILE -->
  <button class="toggle-btn" id="toggleSidebar">
    <i class="fas fa-bars"></i>
  </button>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand">SkillBridge</div>
    <ul class="sidebar-menu">
      <li><a href="FINAL_DASBOARD.html" class="active"><i class="fas fa-th-large"></i> Dashboard</a></li>
      <li><a href="FINAL_PROFIL.html"><i class="fas fa-user"></i> Profil</a></li>
      <li><a href="FINAL_CARI_LOWONGAN.html"><i class="fas fa-search"></i> Cari Lowongan</a></li>
      <li><a href="FINAL_BOOKMARK.html"><i class="fas fa-bookmark"></i> Bookmark</a></li>
      <li><a href="index.html" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="welcome mb-4">
      <h2>Halo, Mahasiswa 👋</h2>
      <p>Ini ringkasan aktivitas lamaran kamu</p>
    </div>

    <!-- STATS -->
    <div class="row g-4">
      <div class="col-lg-3 col-md-6">
        <div class="stat-card">
          <div class="stat-icon" style="background: #7c3aed;"><i class="fas fa-file-alt"></i></div>
          <h3 id="totalLamaran">24</h3>
          <p>Total Lamaran</p>
        </div>
      </div>
      <div class="col-lg-3 col-md-6">
        <div class="stat-card">
          <div class="stat-icon" style="background: #10b981;"><i class="fas fa-check"></i></div>
          <h3 id="diterima">8</h3>
          <p>Diterima</p>
        </div>
      </div>
      <div class="col-lg-3 col-md-6">
        <div class="stat-card">
          <div class="stat-icon" style="background: #f59e0b;"><i class="fas fa-clock"></i></div>
          <h3 id="menunggu">10</h3>
          <p>Menunggu</p>
        </div>
      </div>
      <div class="col-lg-3 col-md-6">
        <div class="stat-card">
          <div class="stat-icon" style="background: #ef4444;"><i class="fas fa-times"></i></div>
          <h3 id="ditolak">6</h3>
          <p>Ditolak</p>
        </div>
      </div>
    </div>

    <!-- GRAFIK -->
    <div class="row">
      <div class="col-lg-8">
        <div class="chart-card">
          <h5><i class="fas fa-chart-line me-2 text-primary"></i>Grafik Lamaran</h5>
          <div class="chart-container">
            <canvas id="lamaranChart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="chart-card">
          <h5><i class="fas fa-chart-pie me-2 text-primary"></i>Status Lamaran</h5>
          <div class="chart-container">
            <canvas id="pieChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // TOGGLE SIDEBAR MOBILE
    document.getElementById('toggleSidebar').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('active');
    });

    // DATA DUMMY
    const data = {
      total: 24,
      diterima: 8,
      menunggu: 10,
      ditolak: 6,
      grafik: {
        labels: ['Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'],
        data: [2, 3, 5, 4, 6, 4]
      }
    };

    // Update angka
    document.getElementById('totalLamaran').innerText = data.total;
    document.getElementById('diterima').innerText = data.diterima;
    document.getElementById('menunggu').innerText = data.menunggu;
    document.getElementById('ditolak').innerText = data.ditolak;

    // GRAFIK LINE KECIL
    new Chart(document.getElementById('lamaranChart'), {
      type: 'line',
      data: {
        labels: data.grafik.labels,
        datasets: [{
          label: 'Lamaran',
          data: data.grafik.data,
          borderColor: '#2563eb',
          backgroundColor: 'rgba(37, 99, 235, 0.1)',
          tension: 0.4,
          fill: true,
          pointBackgroundColor: '#2563eb'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { 
            y: { beginAtZero: true, ticks: { stepSize: 2 } }
        }
      }
    });

    // GRAFIK DOUGHNUT KECIL
    new Chart(document.getElementById('pieChart'), {
      type: 'doughnut',
      data: {
        labels: ['Diterima', 'Menunggu', 'Ditolak'],
        datasets: [{
          data: [data.diterima, data.menunggu, data.ditolak],
          backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
          borderWidth: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom' } }
      }
    });
  </script>
</body>
</html>
