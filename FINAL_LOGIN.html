<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SkillBridge</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #eaf1ff;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 20% 80%, #d6e4ff 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, #c8dcff 0%, transparent 50%);
    }

    .navbar {
      position: sticky;
      top: 10px;
      z-index: 9999;
      background: linear-gradient(90deg, #1e3a8a 0%, #2563eb 100%);
      border-radius: 20px;
      padding: 12px 30px;
      box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
      transition: all 0.3s ease;
      margin-top: 20px;
    }
    .navbar-brand {
      font-weight: 700;
      font-size: 1.6rem;
      color: #fff !important;
    }
    .nav-link {
      color: #fff !important;
      font-weight: 500;
      margin: 0 8px;
      position: relative;
      transition: 0.3s;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -5px;
      left: 0;
      background: #fff;
      transition: 0.3s;
    }
    .nav-link:hover::after, .nav-link.active::after {
      width: 100%;
    }
    .btn-login {
      background: #fff;
      color: #2563eb !important;
      border-radius: 12px;
      padding: 8px 22px;
      font-weight: 600;
      transition: 0.3s;
      margin-left: 15px;
    }
    .btn-login:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
    }
    .navbar-collapse {
      justify-content: flex-end;
    }

    /* LOGIN CARD */
    .login-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 80px 20px;
      min-height: calc(100vh - 120px);
    }
    .login-card {
      background: #fff;
      border-radius: 25px;
      padding: 50px 40px;
      box-shadow: 0 20px 60px rgba(37, 99, 235, 0.15);
      width: 100%;
      max-width: 450px;
      animation: fadeInUp 0.6s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #2563eb, #1e3a8a);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 25px;
      color: #fff;
      font-size: 2.5rem;
    }
    .login-card h2 {
      font-weight: 700;
      color: #1a1f36;
      margin-bottom: 30px;
      text-align: center;
    }
    .form-label {
      font-weight: 600;
      color: #334155;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .form-control {
      border-radius: 12px;
      padding: 12px 16px 12px 45px;
      border: 1.5px solid #e2e8f0;
      transition: 0.3s;
    }
    .form-control:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(50%);
      color: #94a3b8;
      z-index: 5;
    }
    .btn-login-submit {
      background: linear-gradient(90deg, #1e3a8a 0%, #2563eb 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 600;
      transition: 0.3s;
      width: 100%;
      margin-top: 10px;
    }
    .btn-login-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
    }
    .btn-reset {
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 600;
      transition: 0.3s;
      width: 100%;
      margin-top: 10px;
    }
    .btn-reset:hover {
      background: #dc2626;
      transform: translateY(-2px);
    }
    .form-check-input:checked {
      background-color: #2563eb;
      border-color: #2563eb;
    }
    .register-link {
      color: #64748b;
      font-size: 0.95rem;
      text-align: center;
      margin-top: 20px;
    }
    .register-link a {
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }
    .alert-custom {
      border-radius: 12px;
      display: none;
    }

    /* RESPONSIVE */
    @media (max-width: 992px) {
      .navbar-collapse {
        justify-content: flex-start;
        margin-top: 15px;
      }
      .btn-login {
        margin-left: 0;
        margin-top: 10px;
        width: 100%;
      }
    }
    @media (max-width: 768px) {
      .navbar {
        padding: 10px 20px;
      }
      .login-card {
        padding: 35px 25px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand" href="#">SkillBridge</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <i class="fas fa-bars text-white"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="FINAL_ABOUT.html">About</a></li>
          <li class="nav-item"><a href="FINAL_LOGIN.html" class="btn btn-login">Login</a></li>
        </ul>
      </div>
    </nav>

    <!-- LOGIN FORM -->
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-icon">
          <i class="fas fa-user-lock"></i>
        </div>
        <h2>Form Login</h2>

        <div class="alert alert-danger alert-custom" id="alertMsg"></div>

        <form id="loginForm" novalidate>
          <div class="mb-3 position-relative">
            <label class="form-label">Username</label>
            <i class="fas fa-user input-icon"></i>
            <input type="text" class="form-control" id="username" placeholder="Input Username">
          </div>

          <div class="mb-3 position-relative">
            <label class="form-label">Password</label>
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="form-control" id="password" placeholder="Input Password">
          </div>

          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label" for="remember">
              Remember me
            </label>
          </div>

          <div class="row g-2">
            <div class="col-6">
              <button type="submit" class="btn btn-login-submit">
                <!-- <a href="FINAL_DAFTAR.html"></a> -->
                <i class="fas fa-sign-in-alt me-2"></i>LOGIN
              </button>
            </div>
            <div class="col-6">
              <button type="reset" class="btn btn-reset">
                <i class="fas fa-redo me-2"></i>Reset
              </button>
            </div>
          </div>
        </form>

        <p class="register-link">
          Belum punya akun? <a href="FINAL_DAFTAR.html">Daftar di sini</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Efek navbar pas di scroll
    window.addEventListener('scroll', function () {
      const navbar = document.querySelector('.navbar');
      if (window.scrollY > 50) {
        navbar.style.padding = "8px 30px";
        navbar.style.boxShadow = "0 8px 25px rgba(47,74,161,0.5)";
      } else {
        navbar.style.padding = "12px 30px";
        navbar.style.boxShadow = "0 8px 25px rgba(47,74,161,0.3)";
      }
    });

    // VALIDASI LOGIN
    const form = document.getElementById('loginForm');
    const alertMsg = document.getElementById('alertMsg');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const remember = document.getElementById('remember').checked;

      // Reset alert
      alertMsg.style.display = 'none';

      // Validasi
      if(username === '' || password === '') {
        alertMsg.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i>Username dan Password wajib diisi!';
        alertMsg.style.display = 'block';
        return;
      }

      if(password.length < 6) {
        alertMsg.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i>Password minimal 6 karakter!';
        alertMsg.style.display = 'block';
        return;
      }

      // Simulasi Login Sukses
      if(remember) {
        localStorage.setItem('username', username);
      }

      alertMsg.className = 'alert alert-success alert-custom';
      alertMsg.innerHTML = '<i class="fas fa-check-circle me-2"></i>Login Berhasil! Mengalihkan...';
      alertMsg.style.display = 'block';

      setTimeout(() => {
        alert("Login berhasil!");
        window.location.href = "FINAL_DASBOARD.html";
      }, 1500);
    });

    // Load username dari localStorage
    window.addEventListener('load', function() {
      const savedUser = localStorage.getItem('username');
      if(savedUser) {
        document.getElementById('username').value = savedUser;
        document.getElementById('remember').checked = true;
      }
    });
  </script>
</body>
</html>
