<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - SkillBridge</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #eaf1ff;
      min-height: 100vh;
    }

    /* NAVBAR SAMA KAYAK ABOUT & HOME */
    .navbar {
      position: sticky;
      top: 10px;
      z-index: 9999;
      background: linear-gradient(90deg, #1e3a8a 0%, #2563eb 100%);
      border-radius: 20px;
      padding: 12px 30px;
      box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
      transition: all 0.3s ease;
      margin-top: 20px;
    }
    .navbar-brand {
      font-weight: 700;
      font-size: 1.6rem;
      color: #fff !important;
    }
    .nav-link {
      color: #fff !important;
      font-weight: 500;
      margin: 0 8px;
      position: relative;
      transition: 0.3s;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -5px;
      left: 0;
      background: #fff;
      transition: 0.3s;
    }
    .nav-link:hover::after, .nav-link.active::after {
      width: 100%;
    }
    .btn-login {
      background: #fff;
      color: #2563eb !important;
      border-radius: 12px;
      padding: 8px 22px;
      font-weight: 600;
      transition: 0.3s;
      margin-left: 15px;
    }
    .btn-login:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
    }
    .navbar-collapse {
      justify-content: flex-end;
    }

    /* REGISTER CARD */
    .register-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
    }
    .register-card {
      background: #fff;
      border-radius: 25px;
      padding: 50px 40px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 750px;
      animation: fadeInUp 0.6s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .register-card h2 {
      font-weight: 700;
      color: #1a1f36;
      margin-bottom: 10px;
    }
    .register-card p {
      color: #64748b;
      margin-bottom: 30px;
    }
    .form-label {
      font-weight: 600;
      color: #334155;
      font-size: 0.9rem;
    }
    .form-control {
      border-radius: 12px;
      padding: 12px 16px;
      border: 1.5px solid #e2e8f0;
      transition: 0.3s;
    }
    .form-control:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .form-control.is-invalid {
      border-color: #ef4444;
    }
    .invalid-feedback {
      font-size: 0.85rem;
    }
    .btn-daftar {
      background: linear-gradient(90deg, #1e3a8a 0%, #2563eb 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 30px;
      font-weight: 600;
      transition: 0.3s;
      width: 100%;
    }
    .btn-daftar:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
    }
    .login-link {
      color: #64748b;
      font-size: 0.95rem;
    }
    .login-link a {
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }
    .login-link a:hover {
      text-decoration: underline;
    }

    /* RESPONSIVE */
    @media (max-width: 992px) {
      .navbar-collapse {
        justify-content: flex-start;
        margin-top: 15px;
      }
      .btn-login {
        margin-left: 0;
        margin-top: 10px;
        width: 100%;
      }
    }
    @media (max-width: 768px) {
      .navbar {
        padding: 10px 20px;
      }
      .register-card {
        padding: 35px 25px;
      }
      .register-card h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand" href="#">SkillBridge</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <i class="fas fa-bars text-white"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="FINAL_ABOUT.html">About</a></li>
          <li class="nav-item"><a href="FINAL_LOGIN.html" class="btn btn-login">Login</a></li>
        </ul>
      </div>
    </nav>

    <!-- REGISTER FORM -->
    <div class="register-wrapper">
      <div class="register-card">
        <h2 class="text-center">Buat Akun SkillBridge</h2>
        <p class="text-center">Daftar sekarang dan temukan magang impianmu!</p>

        <form id="registerForm" novalidate>
          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label">Nama Lengkap</label>
              <input type="text" class="form-control" id="nama" placeholder="John Doe">
              <div class="invalid-feedback">Nama lengkap wajib diisi</div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="john@email.com">
              <div class="invalid-feedback">Masukkan email yang valid</div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Minimal 8 karakter">
              <div class="invalid-feedback">Password minimal 8 karakter</div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Konfirmasi Password</label>
              <input type="password" class="form-control" id="konfirmasi" placeholder="Ulangi password">
              <div class="invalid-feedback">Password tidak sama</div>
            </div>
            <div class="col-12">
              <label class="form-label">No. Telepon</label>
              <input type="tel" class="form-control" id="telepon" placeholder="081234567890">
              <div class="invalid-feedback">Nomor telepon tidak valid</div>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-daftar">Daftar Sekarang</button>
            </div>
          </div>
        </form>

        <p class="text-center login-link mt-4 mb-0">
          Sudah punya akun? <a href="FINAL_LOGIN.html">Login di sini</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Efek navbar pas di scroll
    window.addEventListener('scroll', function () {
      const navbar = document.querySelector('.navbar');
      if (window.scrollY > 50) {
        navbar.style.padding = "8px 30px";
        navbar.style.boxShadow = "0 8px 25px rgba(47,74,161,0.5)";
      } else {
        navbar.style.padding = "12px 30px";
        navbar.style.boxShadow = "0 8px 25px rgba(47,74,161,0.3)";
      }
    });

    // VALIDASI FORM
    const form = document.getElementById('registerForm');
    
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      let valid = true;

      // Reset
      form.querySelectorAll('.form-control').forEach(input => input.classList.remove('is-invalid'));

      // Validasi Nama
      const nama = document.getElementById('nama');
      if(nama.value.trim().length < 3) {
        nama.classList.add('is-invalid');
        valid = false;
      }

      // Validasi Email
      const email = document.getElementById('email');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if(!emailRegex.test(email.value)) {
        email.classList.add('is-invalid');
        valid = false;
      }

      // Validasi Password
      const password = document.getElementById('password');
      if(password.value.length < 8) {
        password.classList.add('is-invalid');
        valid = false;
      }

      // Validasi Konfirmasi
      const konfirmasi = document.getElementById('konfirmasi');
      if(konfirmasi.value !== password.value || konfirmasi.value === '') {
        konfirmasi.classList.add('is-invalid');
        valid = false;
      }

      // Validasi Telepon
      const telepon = document.getElementById('telepon');
      const telRegex = /^[0-9]{10,13}$/;
      if(!telRegex.test(telepon.value)) {
        telepon.classList.add('is-invalid');
        valid = false;
      }

      // Jika valid
      if(valid) {
        alert('Pendaftaran Berhasil! Selamat datang di SkillBridge 🎉');
        form.reset();
        window.location.href = 'FINAL_DASBOARD.html'; // arahkan ke login
      }
    });
  </script>
</body>
</html>
